name: activity_tracker
description: Activity Tracker Flutter App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Для работы с состоянием
  provider: ^6.1.1

  # Для навигации
  go_router: ^13.0.0

  # Для хранения данных
  sqflite: ^2.3.0
  path: ^1.9.0

  # Для графиков
  fl_chart: ^0.66.0

  # Для работы с датами
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
